<!DOCTYPE html>

    <title>Registro - Imperio Gamer</title>
</head>

<body class="wrapper">

    <header>
        <h1>Imperio Gamer</h1>

        <nav>
            <a href="index.html">Inicio</a>
            <a href="acerca.html">Acerca de nosotros</a>
            <a href="servicios.html">Servicio</a>
            <a href="contacto.html">Contacto</a>
            <a href="#" class="activo">Registro</a>
        </nav>
    </header>

    <main>
        <form class="formulario" action="">
            <h2>Formulario de registro</h2>

            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" required placeholder="Ingrese su nombre">

            <label for="correo">Correo electrónico:</label>
            <input type="email" name="correo" id="correo" required placeholder="Ingrese su correo">

            <label>Género:</label>
            <div class="radio-group">
                <input type="radio" name="genero" id="masculino" value="masculino" required>
                <label for="masculino">Masculino</label>

                <input type="radio" name="genero" id="femenino" value="femenino">
                <label for="femenino">Femenino</label>
            </div>

            <label for="pais">País de residencia:</label>
            <select name="pais" id="pais" required>
                <option value="">--Selecciona un país--</option>
                <option value="ecuador">Ecuador</option>
                <option value="argentina">Argentina</option>
            </select>

            <label for="fechaNac">Fecha de nacimiento:</label>
            <input type="date" id="fechaNac" name="fechaNac">

            <button type="submit">Registrar</button>

        </form>

    </main>

    <footer>
        <p class="titulo-footer">Patrocinadores</p>

        <div class="patrocinadores">

            <a href="https://store.steampowered.com/?l=spanish">Steam</a>
        </div>

    </footer>
</body>

</html>
